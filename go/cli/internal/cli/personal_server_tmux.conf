# Enable extended key reporting
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Enable mouse scrolling and pane selection.
set -g mouse on

# Keep a larger scrollback buffer per pane.
set -g history-limit 100000

# Invert tmux scrollback wheel direction.
bind-key -T root WheelUpPane if-shell -F "#{mouse_any_flag}" { send-keys -M }
bind-key -T root WheelDownPane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -e; send-keys -X -N 5 scroll-up"
bind-key -T copy-mode WheelUpPane select-pane \; send-keys -X -N 5 scroll-down
bind-key -T copy-mode WheelDownPane select-pane \; send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 5 scroll-down
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 5 scroll-up

# Map Shift+Enter to send a newline character (Ctrl+j)
bind -n S-Enter send-keys C-j

# Show the active pane's folder and Git branch in the status line.
set -g status-right-length 120
set -g status-interval 5
set -g status-right '#[fg=black,nobold]#{b:pane_current_path} #({ git -C #{q:pane_current_path} symbolic-ref --quiet --short HEAD 2>/dev/null || git -C #{q:pane_current_path} rev-parse --short HEAD 2>/dev/null; } | sed s/^/git:/) | %H:%M %d-%b#[default]'
